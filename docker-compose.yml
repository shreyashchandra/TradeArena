services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8081:8081"
    environment:
      - TRADEARENA_ENV=local

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - BACKEND_URL=http://backend:8081
      - DATABASE_URL=postgres://tradearena:tradearena@postgres:5432/tradearena
      - RATE_LIMIT_MAX=240
    depends_on:
      - backend
      - postgres
      - redis

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - gateway

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tradearena
      POSTGRES_USER: tradearena
      POSTGRES_PASSWORD: tradearena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - gateway

volumes:
  postgres_data:
